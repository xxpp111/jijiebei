<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>集结杯 × CM — v4 选择面板 · 边框系统与控制条</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Noto+Serif+SC:wght@700;900&family=Oswald:wght@500;600;700&family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme.css">
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="v4.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>html, body { margin: 0; padding: 0; }</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="select-screen.jsx"></script>
<script type="text/babel" src="spec-factor.jsx"></script>
<script type="text/babel" src="spec-cmd.jsx"></script>
<script type="text/babel" src="spec-impl.jsx"></script>
<script type="text/babel">
function V4Canvas() {
  return (
    <DesignCanvas>
      <DCSection id="screens" title="选择面板 · v4 整屏" subtitle="边框系统 + 全局控制条 + 校验提示落位 · 1280×720">
        <DCArtboard id="s-metal-dark" label="金属·暗 — 控制条展开 + 校验提示" width={1280} height={720}>
          <SelectScreenV4 styleName="metal" mode="dark" barState="full" toast={true} />
        </DCArtboard>
        <DCArtboard id="s-minimal-light" label="极简·亮 — 绿框亮底适配" width={1280} height={720}>
          <SelectScreenV4 styleName="minimal" mode="light" barState="full" toast={false} />
        </DCArtboard>
        <DCArtboard id="s-sc2-dark" label="星际2·暗 — 控制条收起态（直播）" width={1280} height={720}>
          <SelectScreenV4 styleName="sc2" mode="dark" barState="collapsed" toast={false} />
        </DCArtboard>
        <DCPostIt>本轮只交付 select；battle / 浮层横条 / 二选层（home）确认后下一轮。第 1 场=已填态、第 2 场=拖放进行中、自选区=拖拽+起点残影。</DCPostIt>
      </DCSection>

      <DCSection id="ctrl" title="§3 全局控制条" subtitle="导航 + 重新随机 / 回主界面（二次确认）+ 主题切换 + 收起态">
        <DCArtboard id="ctrl-states" label="形态与状态" width={920} height={500}>
          <CtrlStates />
        </DCArtboard>
      </DCSection>

      <DCSection id="factor" title="§1 因子边框系统" subtitle="普通 mutatorframe 绿框 / 金色 grandmaster 金框 · 状态矩阵与尺寸族">
        <DCArtboard id="fx-matrix" label="状态矩阵" width={830} height={420}>
          <FactorMatrix />
        </DCArtboard>
        <DCArtboard id="fx-sizes" label="尺寸族" width={830} height={265}>
          <FactorSizes />
        </DCArtboard>
        <DCArtboard id="fx-themes" label="6 主题适配" width={950} height={122}>
          <ThemeStrip />
        </DCArtboard>
      </DCSection>

      <DCSection id="cmd" title="§2 指挥官边框系统" subtitle="微圆角 + 内外亮光描边 + 投影 · 参考游戏选人界面">
        <DCArtboard id="cc-matrix" label="状态矩阵" width={780} height={345}>
          <CmdMatrix />
        </DCArtboard>
        <DCArtboard id="cc-sizes" label="尺寸族 + 名牌" width={780} height={300}>
          <CmdSizes />
        </DCArtboard>
      </DCSection>

      <DCSection id="impl" title="§4/§6 落地规格" subtitle="九宫格切片 · 动效时长/缓动 · Cocos 实现备注">
        <DCArtboard id="impl-spec" label="九宫格 / 动效 / Cocos" width={920} height={520}>
          <ImplSpec />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<V4Canvas />);
</script>
</body>
</html>
