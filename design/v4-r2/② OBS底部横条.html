<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>集结杯 v4 · ② OBS 底部横条（重点块）</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Noto+Serif+SC:wght@700;900&family=Oswald:wght@500;700&family=Rajdhani:wght@600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="theme.css" />
<link rel="stylesheet" href="styles.css" />
<link rel="stylesheet" href="v4.css" />
<link rel="stylesheet" href="obs.css" />
<style>
  html, body { margin: 0; height: 100%; }
  #root { width: 100vw; height: 100vh; }
  /* 缩放校验底板：让小尺寸横条有可对照的边界 */
  .obs-shelf { display: flex; align-items: flex-end; gap: 34px; padding: 24px 30px; background: #14171c; height: 100%; box-sizing: border-box; }
  .obs-shelf.light { background: #c8cdd4; }
  .obs-shelf-col { display: flex; flex-direction: column; gap: 9px; align-items: flex-start; }
  .obs-shelf-cap { font-family: "Share Tech Mono", monospace; font-size: 13px; color: #9aa3b0; letter-spacing: 1px; }
  .obs-shelf.light .obs-shelf-cap { color: #4a525e; }
  .obs-shelf-cap.key { color: #D8B15A; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="components/select-screen.jsx"></script>
<script type="text/babel" src="components/battle-screen.jsx"></script>
<script type="text/babel" src="components/obs-bar.jsx"></script>
<script type="text/babel" src="components/spec-factor.jsx"></script>
<script type="text/babel" src="components/spec-obs.jsx"></script>
<script type="text/babel">
  const THEMES = [
    ["metal", "dark", "金属 · 暗"], ["metal", "light", "金属 · 亮"],
    ["sc2", "dark", "星际2 · 暗"], ["sc2", "light", "星际2 · 亮"],
    ["minimal", "dark", "极简 · 暗"], ["minimal", "light", "极简 · 亮"],
  ];

  function App() {
    return (
      <DesignCanvas>
        <DCSection id="obs-themes" title="② OBS 底部横条 · 6 主题（重点块）"
          subtitle="1280×232 专用形态 · 当前进行场 hero 强调 · 三场（地图/双指挥官/带框因子/状态徽章）+ 大比分 · 直播态（第 2 场进行中）">
          {THEMES.map(([s, m, lab]) => (
            <DCArtboard key={s + m} id={"obs-" + s + "-" + m} label={lab} width={1280} height={232}>
              <OBSBar styleName={s} mode={m} />
            </DCArtboard>
          ))}
        </DCSection>

        <DCSection id="obs-scale" title="缩放校验 · 缩至 1/3 仍可读（硬标准）"
          subtitle="同一横条逐级缩小 100% → 50% → 33%（427px）；状态色块 / 大比分 / 当前场包边 / 头像轮廓保持可辨">
          <DCArtboard id="scale-dark" label="星际2 · 暗 — 100 / 50 / 33%" width={760} height={300}>
            <div className="obs-shelf">
              <div className="obs-shelf-col"><span className="obs-shelf-cap">50% · 640×116</span><OBSScaled scale={0.5} styleName="sc2" mode="dark" /></div>
              <div className="obs-shelf-col"><span className="obs-shelf-cap key">33% · 427×77 ★基准</span><OBSScaled scale={0.333} styleName="sc2" mode="dark" /></div>
            </div>
          </DCArtboard>
          <DCArtboard id="scale-light" label="极简 · 亮 — 100 / 50 / 33%" width={760} height={300}>
            <div className="obs-shelf light">
              <div className="obs-shelf-col"><span className="obs-shelf-cap">50% · 640×116</span><OBSScaled scale={0.5} styleName="minimal" mode="light" /></div>
              <div className="obs-shelf-col"><span className="obs-shelf-cap key">33% · 427×77 ★基准</span><OBSScaled scale={0.333} styleName="minimal" mode="light" /></div>
            </div>
          </DCArtboard>
        </DCSection>

        <DCSection id="obs-states" title="全场判定态（胜利 / 带奖励 / 失败）"
          subtitle="三场均已判定时横条的样子 · 局分 pip 与大比分随判定更新">
          <DCArtboard id="decided-metal" label="金属 · 暗（已结束）" width={1280} height={232}>
            <OBSBar styleName="metal" mode="dark" rows={OBS_ROWS_DECIDED} scoreLabel="终局 · 已胜场" />
          </DCArtboard>
          <DCArtboard id="decided-sc2" label="星际2 · 亮（已结束）" width={1280} height={232}>
            <OBSBar styleName="sc2" mode="light" rows={OBS_ROWS_DECIDED} scoreLabel="终局 · 已胜场" />
          </DCArtboard>
        </DCSection>

        <DCSection id="obs-spec" title="规格板"
          subtitle="分区与落位 / 状态矩阵 / 尺寸族·1/3 校验 / 动效·Cocos 2.4 程序化要点 — 照 ① spec 格式">
          <DCArtboard id="s-anat" label="分区与落位" width={1340} height={500}>
            <OBSAnatomy />
          </DCArtboard>
          <DCArtboard id="s-state" label="状态矩阵 + 当前场强调" width={1000} height={520}>
            <OBSStates />
          </DCArtboard>
          <DCArtboard id="s-size" label="尺寸族 + 1/3 缩放校验" width={1000} height={520}>
            <OBSSizes />
          </DCArtboard>
          <DCArtboard id="s-impl" label="动效 / Cocos 落地" width={1000} height={470}>
            <OBSImpl />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
