# 集结杯 nginx 三者共存反代 conf（web 展示层 + admin 后台 + backend PocketBase）
#
# 用途：一份完整的 nginx server 块，把三者合到同源 :8080，免 CORS。
#       替代过去散落的三片（nginx-api.conf 仅 /api、nginx-admin.conf 仅 /admin、web 静态无独立 conf）。
#
# 拓扑：浏览器 → nginx :8080 ┬─ location /          → web/dist   展示层（SC2 三皮肤，主站）
#                            ├─ location /admin/    → admin/dist Arco 后台（vite base=/admin/）
#                            ├─ location /api/      → 127.0.0.1:8090 PocketBase REST
#                            └─ location /_/        → 127.0.0.1:8090 PocketBase Admin UI
#
# 红线：仅配置沉淀，不实际上线（CF Pages 前端连 devbox 后端的公网暴露走 SRE/TLB，见 runbook-triple.md caveat）。
# 部署：devbox 上把本文件 include 进 nginx.conf 的 http{} 内（或 server 块直接粘贴），nginx -t && nginx -s reload。
#
# 前置：三份静态产物 + 后端进程已就位（见 runbook-triple.md §部署顺序）：
#   /opt/jjb/web/dist/      ← web  build（cd web && npm run build）
#   /opt/jjb/admin/dist/    ← admin build（cd admin && npm run build，vite base=/admin/）
#   127.0.0.1:8090          ← PocketBase 裸进程（jjb-backend.service 守护）

server {
    listen 8080;
    server_name _;

    # ── 1. 展示层 web（主站，location / 兜底静态托管）────────────────────────────
    # web/dist 是 vite 产物（base=/，资源 /assets/*）。SPA 无前端路由（hash 路由），try_files 兜底 index.html。
    root /opt/jjb/web/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 展示层静态资源长缓存（vite 产物带 hash）
    location ~* ^/assets/.+\.(js|css|woff2?|png|jpg|jpeg|svg|webp)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── 2. admin 后台（Arco 子应用，base=/admin/）──────────────────────────────
    # admin/dist 是 vite 产物（base=/admin/，资源 /admin/assets/*）。react-router basename=/admin。
    location /admin/ {
        alias /opt/jjb/admin/dist/;
        try_files $uri /admin/index.html;
        index index.html;
        client_max_body_size 10m;

        location ~* ^/admin/assets/.+\.(js|css|woff2?|png|jpg|jpeg|svg)$ {
            alias /opt/jjb/admin/dist/;
            try_files $uri =404;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── 3. backend PocketBase /api 反代（REST + realtime SSE）─────────────────
    # 前端 fetch('/api/...') 同源 → 免 CORS。SSE 需禁缓冲 + 长连接。
    location /api/ {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;          # realtime SSE 必需
        proxy_read_timeout 86400s;    # SSE 长连接
        client_max_body_size 10m;     # 头像等文件上传
    }

    # ── 4. PocketBase Admin UI（/_/）反代 ─────────────────────────────────────
    # 主播/管理员后台（数据库管理），与 admin/ Arco 后台不同（后者是业务后台）。
    location /_/ {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_read_timeout 86400s;
    }
}
