# 集结杯 nginx 三者共存反代 conf —— Docker 容器适配版（A3：bridge 网络 + docker0 网关）
#
# 用途：挂载进 docker 容器 jijiebei-nginx（nginx:1.27-alpine）的
#       /etc/nginx/conf.d/default.conf，把 web + admin + /api 三者合到同源 :8080，免 CORS。
#
# 与 backend/deploy/nginx-triple.conf（裸 nginx on 宿主 版）的区别（容器内全要改）：
#   - listen 80（非 8080）：容器 -p 8080:80 映射，容器内 nginx 监听 80，宿主 8080
#   - root /usr/share/nginx/html（非 /opt/jjb/web/dist）：容器内 web 挂载点
#   - alias /admin/dist/（非 /opt/jjb/admin/dist/）：容器内 admin 挂载点
#   - proxy_pass http://172.17.0.1:8090（非 127.0.0.1:8090）：
#       Docker 18.09 不支持 host-gateway（--add-host=host.docker.internal:host-gateway 报错），
#       默认 bridge 网络下容器内 127.0.0.1 是容器自己 → 用 docker0 网桥网关 172.17.0.1 访问宿主。
#       前提：backend 监听 0.0.0.0:8090（实测 *:8090，已满足）。
#       2026-06-23 实测容器内经 172.17.0.1:8090/api/health 返 {"code":200} ✓
#
# 拓扑：浏览器 → 宿主 :8080 ─(-p 8080:80)→ 容器 nginx :80
#                            ├─ location /          → /usr/share/nginx/html  web SPA（主站）
#                            ├─ location /admin/    → /admin/dist/            admin SPA（Arco 后台，base=/admin/）
#                            ├─ location /api/      → 172.17.0.1:8090         PocketBase REST + realtime
#                            └─ location /_/        → 172.17.0.1:8090         PocketBase Admin UI
#
# 容器 run 命令（A3，保留现有 -p 8080:80，只加 admin + conf 两个挂载）：
#   docker run -d --name jijiebei-nginx --restart=always \
#     -p 8080:80 \
#     -v ~/jijiebei-deploy/web/dist:/usr/share/nginx/html:ro \
#     -v ~/jijiebei-deploy/admin/dist:/admin/dist:ro \
#     -v ~/jijiebei-deploy/nginx-conf/default.conf:/etc/nginx/conf.d/default.conf:ro \
#     nginx:1.27-alpine
#
# 回滚（去掉 admin/conf 挂载即恢复单层 web）：
#   docker stop jijiebei-nginx && docker rm jijiebei-nginx
#   docker run -d --name jijiebei-nginx --restart=always -p 8080:80 \
#     -v ~/jijiebei-deploy/web/dist:/usr/share/nginx/html:ro nginx:1.27-alpine

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── 1. web 展示层（主站 SPA，location / 兜底）────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── 2. admin 后台（Arco 子应用，base=/admin/，alias 必须带尾斜杠）─────────
    location /admin/ {
        alias /admin/dist/;
        try_files $uri /admin/index.html;
        index index.html;
        client_max_body_size 10m;
    }

    # ── 3. backend PocketBase /api 反代（REST + realtime SSE）─────────────────
    # SSE 需禁缓冲 + 长连接。
    location /api/ {
        proxy_pass http://172.17.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;          # realtime SSE 必需
        proxy_read_timeout 86400s;    # SSE 长连接
        client_max_body_size 10m;     # 头像等文件上传
    }

    # ── 4. PocketBase Admin UI（/_/）反代 ─────────────────────────────────────
    location /_/ {
        proxy_pass http://172.17.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_read_timeout 86400s;
    }
}
