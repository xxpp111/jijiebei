# 集结杯 P5 后端 nginx /api 反代片段（加在现有 8080 server 块内，不动 location / 静态托管）。
#
# 拓扑：浏览器 → nginx :8080 ┬─ location /       → web/dist 静态文件（现状不变）
#                            └─ location /api/    → proxy_pass http://127.0.0.1:8090 (PocketBase)
# 前端 fetch('/api/...') 同源 → 免 CORS（research-backend-p5 §2.3）。
#
# caveat 1: CF Pages 前端连 devbox 后端的公网暴露受内网穿透红线约束，须 SRE 走 TLB，
#           是独立后续事项；本 round 只做 devbox 内 /api 同源反代（research §2.4-a）。

location /api/ {
    proxy_pass http://127.0.0.1:8090;          # PocketBase 裸进程
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # PocketBase realtime（SSE）需要：禁用缓冲 + 长连接
    proxy_set_header Connection '';
    proxy_buffering off;
    proxy_read_timeout 86400s;

    # 头像等文件上传
    client_max_body_size 10m;
}

# PocketBase Admin UI（/_/）也走反代（主播/管理员后台）
location /_/ {
    proxy_pass http://127.0.0.1:8090;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection '';
    proxy_buffering off;
    proxy_read_timeout 86400s;
}
