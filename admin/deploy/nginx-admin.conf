# admin/ Arco 后台 nginx 托管片段
# 加在现有 8080 server 块内，与 location /（展示层 web/dist）、/api/（PocketBase 后端）三者同 nginx 共存。
#
# 拓扑：浏览器 → nginx :8080 ┬─ location /          → web/dist  静态文件（展示层 SC2 三皮肤，现状不变）
#                            ├─ location /admin/    → admin/dist Arco 后台（vite base=/admin/，SPA try_files 回退）
#                            ├─ location /api/      → 127.0.0.1:8090 (PocketBase，见 nginx-api.conf)
#                            └─ location /_/        → 127.0.0.1:8090 (PocketBase Admin UI)
#
# admin/ build 产物：cd admin && npm run build → admin/dist（base=/admin/，资源路径 /admin/assets/*）。
# 物理隔离：admin/ 独立子应用，不碰 web/ 三皮肤 token；仅共享同源 /api 后端。

location /admin/ {
    alias /opt/jjb/admin/dist/;          # admin/dist 部署路径（按 devbox 实际调整）
    try_files $uri /admin/index.html;    # SPA 路由回退（react-router basename=/admin）
    index index.html;
    client_max_body_size 10m;

    # 静态资源缓存（vite 产物带 hash，可长缓存）
    location ~* ^/admin/assets/.+\.(js|css|woff2?|png|jpg|svg)$ {
        alias /opt/jjb/admin/dist/;
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
